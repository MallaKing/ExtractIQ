services:
  # The Core Multi-Tenant Web + Worker Engine
  - type: web
    name: extractiq-engine
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && pip install supervisor"
    startCommand: "supervisord -c supervisord.conf"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      # --- Managed Infrastructure Auto-Injections ---
      - key: DATABASE_URL
        fromDatabase:
          name: extractiq-postgres-db
          property: connectionString
          
      # Updated Redis environment mappings for Render Key-Value structure
      - key: REDIS_URL
        fromParam:
          service: extractiq-redis
          value: connectionString
      - key: CELERY_BROKER_URL
        fromParam:
          service: extractiq-redis
          value: connectionString
      - key: CELERY_RESULT_BACKEND
        fromParam:
          service: extractiq-redis
          value: connectionString

      # --- Secrets: set these in the Render dashboard ---
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: NGROK_DOMAIN
        sync: false
      - key: GOOGLE_DRIVE_WEBHOOK_TOKEN
        value: extractiq-webhook-secret

      # --- App config ---
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: JOB_RETENTION_HOURS
        value: "24"

# --- Managed Redis (Moved out of services block to fix the firewall issue) ---
kvStores:
  - name: extractiq-redis
    plan: free

# --- Managed PostgreSQL ---
databases:
  - name: extractiq-postgres-db
    plan: free
    databaseName: extractiq_prod
    user: extractiq_admin
